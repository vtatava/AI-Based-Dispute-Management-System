# Server Configuration
server.port=9090

# Application Name
spring.application.name=dispute-ai

# Logging
logging.level.com.app=INFO

# Ollama Configuration
# Base URL for Ollama API (default: http://localhost:11434)
ollama.base-url=http://localhost:11434

# Ollama Model to use (options: llama3.2, mistral, phi3, llama2, gpt-4o-mini, etc.)
# Make sure you have pulled the model using: ollama pull chevalblanc/gpt-4o-mini
ollama.model=chevalblanc/gpt-4o-mini

# Timeout for Ollama API calls in seconds
ollama.timeout=180

# Enable/Disable Ollama Integration
ollama.enabled=true

# IBM ICA (IBM Consulting Advantage) Configuration
# Use IBM ICA for faster cloud-based AI analysis
# Get the Cline key from ICA portal and use it here
ibm.ica.enabled=true
ibm.ica.api-key=7:xxx:96ca8495-9263-4979-8c45-959b782f687e:8bf27c6a-543a-4eee-9565-5e11bd79a2ce:56018549-6321-4e2e-b574-28c3287571ff
ibm.ica.base-url=https://servicesessentials.ibm.com/apis/v3
ibm.ica.model=global/anthropic.claude-sonnet-4-5-20250929-v1:0
ibm.ica.timeout=90

# LLM Provider Selection (ollama, ibm-ica, or openai-compat)
llm.provider=openai-compat

# H2 Database Configuration (File-based)
spring.datasource.url=jdbc:h2:file:./data/disputedb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OCR Configuration (Tesseract)
# Enable/Disable OCR for ID validation
# Set to false by default - enable after installing Tesseract (see TESSERACT_OCR_SETUP.md)
ocr.enabled=true

# Tesseract data path (leave empty to use default system path)
# Windows: Download tessdata from https://github.com/tesseract-ocr/tessdata
# and set path like: C:/Program Files/Tesseract-OCR/tessdata
# Linux/Mac: Usually /usr/share/tesseract-ocr/4.00/tessdata
# AI-Powered ID Extraction Configuration
# Enable intelligent ID extraction and fuzzy matching
ai.id.extraction.enabled=true
tesseract.datapath=C:/Program Files/Tesseract-OCR/tessdata

