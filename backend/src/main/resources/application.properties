# Server Configuration
server.port=9090

# Application Name
spring.application.name=dispute-ai

# Logging
logging.level.com.app=INFO

# Ollama Configuration
# Base URL for Ollama API (default: http://localhost:11434)
ollama.base-url=http://localhost:11434

# Ollama Model to use (options: llama3.2, mistral, phi3, llama2, gpt-4o-mini, etc.)
# Make sure you have pulled the model using: ollama pull chevalblanc/gpt-4o-mini
ollama.model=chevalblanc/gpt-4o-mini

# Timeout for Ollama API calls in seconds
ollama.timeout=180

# Enable/Disable Ollama Integration
ollama.enabled=true

